syntax = "proto3";

package tokenspeed.grpc.scheduler;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "common.proto";

// TokenSpeed scheduler gRPC service. Self-contained wire definition apart
// from the cross-engine admin messages in smg.grpc.common (flush/profile).
// Trimmed to text+multimodal generation (no embed, no PD-disaggregated, no
// LoRA, no hidden-state forwarding). Multimodal carries preprocessed
// tensors only — image fetch + per-model preprocess happen in the
// gateway (see crates/multimodal).
service TokenSpeedScheduler {
  rpc Generate(GenerateRequest) returns (stream GenerateResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Abort(AbortRequest) returns (AbortResponse);
  rpc GetModelInfo(GetModelInfoRequest) returns (GetModelInfoResponse);
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
  rpc GetLoads(GetLoadsRequest) returns (GetLoadsResponse);

  // Flush the KV cache on the scheduler
  rpc FlushCache(smg.grpc.common.FlushCacheRequest) returns (smg.grpc.common.FlushCacheResponse);

  // Start the profiler on the scheduler
  rpc StartProfile(smg.grpc.common.StartProfileRequest) returns (smg.grpc.common.ProfileResponse);

  // Stop the profiler and export traces
  rpc StopProfile(smg.grpc.common.StopProfileRequest) returns (smg.grpc.common.ProfileResponse);

  // Subscribe to KV cache events (server-streaming). Lets the gateway's
  // cache-aware router track which prefixes this scheduler has cached.
  rpc SubscribeKvEvents(smg.grpc.common.SubscribeKvEventsRequest)
      returns (stream smg.grpc.common.KvEventBatch);
}

// =====================
// Sampling
// =====================

// Sampling scalars are `optional` so the servicer can distinguish
// "client set 0" from "client unset" via `HasField()`. `min_new_tokens`
// stays non-optional because 0 is its semantic "no minimum" sentinel.
message SamplingParams {
  optional float temperature = 1;
  optional float top_p = 2;
  optional int32 top_k = 3;
  optional float min_p = 4;
  optional float frequency_penalty = 5;
  optional float presence_penalty = 6;
  optional float repetition_penalty = 7;

  optional uint32 max_new_tokens = 8;
  uint32 min_new_tokens = 9;

  repeated string stop = 10;
  repeated uint32 stop_token_ids = 11;
  bool ignore_eos = 12;

  bool skip_special_tokens = 13;
  bool spaces_between_special_tokens = 14;

  // Number of samples (n in OpenAI API).
  uint32 n = 15;

  // Per-token logit bias.
  map<string, float> logit_bias = 16;

  // Structured generation. Currently xfailed in e2e (tokenspeed#361).
  oneof constraint {
    string regex = 17;
    string json_schema = 18;
    string ebnf_grammar = 19;
    string structural_tag = 20;
  }

  // Keep the trailing matched stop token in `output_ids`.
  bool no_stop_trim = 22;

  // Escape hatch for backend-specific knobs without bumping the proto.
  google.protobuf.Struct custom_params = 21;
}

// =====================
// Generate
// =====================

message GenerateRequest {
  string request_id = 1;

  // Tokenized input (router does its own tokenization).
  TokenizedInput tokenized = 2;

  SamplingParams sampling_params = 3;

  // Logprob options.
  bool return_logprob = 4;
  // Optional: unset = no input logprobs; explicit 0 = "from start".
  optional int32 logprob_start_len = 5;
  int32 top_logprobs_num = 6;
  repeated uint32 token_ids_logprob = 7;

  // Whether the client wants stream chunks (otherwise: complete-only).
  bool stream = 8;

  // Preprocessed multimodal payload. Absent for text-only requests.
  MultimodalInputs mm_inputs = 9;

}

message TokenizedInput {
  repeated uint32 input_ids = 1;
  string original_text = 2; // cosmetic, for worker logs
}

// A typed tensor descriptor. The raw tensor bytes live in exactly one payload
// transport; shape and dtype describe how the receiver should interpret them.
message TensorData {
  repeated uint32 shape = 1;   // Dimension sizes
  string dtype = 2;            // "float32", "bfloat16", "float16", "int64", "uint32"

  oneof payload {
    // Current path: raw little-endian bytes carried in the gRPC message.
    bytes inline = 3;
    // Same-host CPU shared memory path.
    ShmHandle shm = 4;
    // Transport-specific remote descriptor (NIXL/RDMA/object-store/etc.).
    RemoteTensorHandle remote = 5;
  }
}

message ShmHandle {
  string name = 1;
  uint64 offset = 2;
  uint64 nbytes = 3;
  // Producer/lifetime owner. Used by implementations to coordinate cleanup.
  string owner_id = 4;
}

message RemoteTensorHandle {
  // Examples: "nixl", "ucx", "object_store".
  string transport = 1;
  bytes descriptor = 2;
  uint64 nbytes = 3;
}

// Where a multimodal item's tokens sit inside input_ids.
message PlaceholderRange {
  uint32 offset = 1;
  uint32 length = 2;
}

enum Modality {
  MODALITY_UNSPECIFIED = 0;
  IMAGE = 1;
  AUDIO = 2;
  VIDEO = 3;
}

message MultimodalItem {
  Modality modality = 1;
  bytes content_hash = 2;
  // Primary input to the multimodal encoder for this item. For vision models
  // this is the preprocessed image/video tensor; for audio models this can be
  // audio features or waveform-derived encoder input.
  TensorData encoder_input = 3;
  // Model-specific side tensors (image_grid_thw, video_grid_thw, etc.).
  map<string, TensorData> model_specific_tensors = 4;
  repeated PlaceholderRange placeholders = 5;
  optional uint32 placeholder_token_id = 6;
}

// Multimodal inputs for vision/audio models. Tensors are produced by the
// gateway's per-model preprocessor (crates/multimodal); the servicer
// only reconstructs them and hands them to the engine — no preprocess.
message MultimodalInputs {
  // Per-modality itemized payload. Each item owns its tensor payload,
  // placeholder metadata, and modality-specific token id.
  repeated MultimodalItem items = 1;
}

message GenerateResponse {
  string request_id = 1;

  oneof response {
    GenerateStreamChunk chunk = 2;
    GenerateComplete complete = 3;
  }
}

message GenerateStreamChunk {
  // Generated tokens since the previous chunk.
  repeated uint32 token_ids = 1;

  uint32 prompt_tokens = 2;
  uint32 completion_tokens = 3;
  uint32 cached_tokens = 4;

  OutputLogProbs output_logprobs = 5;

  // For ordering when n>1.
  uint32 index = 6;
}

message GenerateComplete {
  repeated uint32 output_ids = 1;

  // OpenAI-compatible: "stop", "length", "abort", "tool_calls".
  string finish_reason = 2;

  uint32 prompt_tokens = 3;
  uint32 completion_tokens = 4;
  uint32 cached_tokens = 5;

  OutputLogProbs output_logprobs = 6;

  // Which stop matched (for clients that care which `stop` triggered).
  oneof matched_stop {
    uint32 matched_token_id = 7;
    string matched_stop_str = 8;
  }

  uint32 index = 9;
}

message OutputLogProbs {
  repeated float token_logprobs = 1;
  repeated uint32 token_ids = 2;
  repeated TopLogProbs top_logprobs = 3;
}

message TopLogProbs {
  repeated float values = 1;
  repeated uint32 token_ids = 2;
}

// =====================
// Management
// =====================

message HealthCheckRequest {}
message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

message AbortRequest {
  string request_id = 1;
  string reason = 2;
}
message AbortResponse {
  bool success = 1;
  string message = 2;
}

// =====================
// Model & Server Info
// =====================

message GetModelInfoRequest {}
message GetModelInfoResponse {
  string model_path = 1;
  string tokenizer_path = 2;
  string served_model_name = 3;
  string model_type = 4;
  repeated string architectures = 5;

  int32 max_context_length = 6;
  int32 max_req_input_len = 7;
  int32 vocab_size = 8;

  repeated int32 eos_token_ids = 9;
  int32 pad_token_id = 10;
  int32 bos_token_id = 11;

  string weight_version = 12;
  // Backend-reported sampling defaults (JSON string, e.g.
  // ``{"temperature": 0.6, "top_p": 0.9}``). Empty = no overrides. Surfaced
  // to the router via the ``default_sampling_params_json`` worker label.
  string default_sampling_params_json = 13;

  // True when the model can consume image/video inputs. Drives the
  // router's mm_inputs handling (router rejects mm requests for
  // non-vision workers before tokenization).
  bool supports_vision = 14;
  bool supports_multimodal = 15;
  repeated Modality supported_modalities = 16;
  string model_dtype = 17;
  string multimodal_encoder_dtype = 18;
}

message GetServerInfoRequest {}
message GetServerInfoResponse {
  google.protobuf.Struct server_args = 1;
  google.protobuf.Struct scheduler_info = 2;

  int32 active_requests = 3;
  bool is_paused = 4;
  double uptime_seconds = 5;
  int32 max_total_num_tokens = 6;

  string tokenspeed_version = 7;
  google.protobuf.Timestamp start_time = 8;
}

// =====================
// Loads
// =====================

message GetLoadsRequest {
  optional int32 dp_rank = 1;
  // Sections: "core" (default), "memory", "queues". Pass "all" for everything.
  repeated string include = 2;
}

message GetLoadsResponse {
  string timestamp = 1;
  string version = 2;
  int32 dp_rank_count = 3;
  repeated SchedulerLoad loads = 4;
  AggregateMetrics aggregate = 5;
}

message SchedulerLoad {
  int32 dp_rank = 1;

  int32 num_running_reqs = 2;
  int32 num_waiting_reqs = 3;
  int32 num_total_reqs = 4;
  int32 num_used_tokens = 5;
  int32 max_total_num_tokens = 6;
  int32 max_running_requests = 7;

  // Queued token-work: waiting-queue prompt tokens not served from cache
  // (mirrors SGLang's num_waiting_uncached_tokens). The gateway's least_load
  // policy uses this as its queued-token signal; 0 when not reported. Grouped
  // with the other counts for readability; numbered 14 (the next free number)
  // so the existing field numbers stay stable.
  int32 num_waiting_uncached_tokens = 14;

  double token_usage = 8;
  double gen_throughput = 9;
  double cache_hit_rate = 10;
  double utilization = 11;

  optional MemoryMetrics memory = 12;
  optional QueueMetrics queues = 13;
}

message MemoryMetrics {
  double weight_gb = 1;
  double kv_cache_gb = 2;
  double graph_gb = 3;
  int32 token_capacity = 4;
}

message QueueMetrics {
  int32 waiting = 1;
  int32 grammar = 2;
  int32 paused = 3;
  int32 retracted = 4;
}

message AggregateMetrics {
  int32 total_running_reqs = 1;
  int32 total_waiting_reqs = 2;
  int32 total_reqs = 3;
  double avg_token_usage = 4;
  double avg_throughput = 5;
  double avg_utilization = 6;
}
