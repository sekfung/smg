name: Nightly Docker Build

on:
  schedule:
    # 06:00 UTC daily — 2 hours before nightly benchmarks (08:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-docker
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build nightly Docker image
    if: github.repository == 'lightseekorg/smg'
    runs-on: ["cpu-e5"]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SUFFIX="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          {
            echo "list<<EOF"
            echo "ghcr.io/lightseekorg/smg:nightly"
            echo "ghcr.io/lightseekorg/smg:nightly-${SUFFIX}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
